        - paragraph [ref=e149]: "She boards the Motunui at Sailfish Marina at five. Bring a bottle of something white and cold; they pour the glasses. Ninety minutes on the water, then dinner at Milos, where you've asked for a window table when you booked. Order the whole branzino for two and let her pick from the Greek list. By ten, the Speakeasy above Sourbon is the right size: low ceiling, the bartender makes what you remember from somewhere, and the conversation has already gotten somewhere worth staying."
